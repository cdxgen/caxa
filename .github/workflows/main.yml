name: npm test and release

on:
  push:
    branches:
      - main
      - release/*
    tags:
    - 'v*'
  workflow_dispatch:
  pull_request:
permissions:
  contents: read
jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, windows-11-arm, macos-latest, macos-15-intel, ubuntu-22.04, ubuntu-24.04, ubuntu-22.04-arm, ubuntu-24.04-arm]
        node-version: ['22.15.0', '24.x', '25.x', '26.x']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          package-manager-cache: false
      - run: node scripts/setup-upx.mjs
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version: '^1.25.6'
          cache: false
      - run: |
          npm ci
          npm run prepare
          npm test

  npm-publish:
    if: startsWith(github.ref, 'refs/tags/')
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '25.x'
          registry-url: https://registry.npmjs.org/
          scope: '@cdxgen'
          package-manager-cache: false
      - run: node scripts/setup-upx.mjs
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version: '^1.25.6'
          cache: false
      - run: |
          npm ci
          npm run prepare
          npm test
          npm publish --access=public
